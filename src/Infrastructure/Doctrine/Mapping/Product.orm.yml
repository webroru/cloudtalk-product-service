App\Domain\Product\Entity\Product:
  type: entity
  table: products
  id:
    id:
      type: App\Infrastructure\Doctrine\Type\ProductIdType
      generator:
        strategy: NONE
  fields:
    name:
      type: string
      length: 255
    description:
      type: string
      nullable: true
      length: 255
    price:
      type: float
